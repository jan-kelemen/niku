name: GitHub CI

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-24.04
    environment: Conan
    
    env:
      GCC_VER: 14
      CLANG_VER: 21
      
    strategy:
      fail-fast: false
      matrix:
        profile: [gcc-amd64-linux-hardened, clang-libstdcxx-amd64-linux-hardened, clang-libcxx-amd64-linux-hardened]
        
    steps:
      - name: Checkout repository from github
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install gcc-${{ env.GCC_VER }}
        uses: ./.github/actions/install-gcc
        with:
          version: ${{ env.GCC_VER }}

      - name: Install clang-${{ env.CLANG_VER }}
        if: contains(matrix.profile, 'clang')
        uses: ./.github/actions/install-clang 
        with:
          version: ${{ env.CLANG_VER }}

      - name: Install APT packages
        uses: ./.github/actions/install-apt-packages

      - name: Setup Conan
        id: setup-conan
        uses: ./.github/actions/setup-conan
        with:
          profile: ${{ matrix.profile }}
          url: ${{ secrets.CONAN_REMOTE_URL }}
          token: ${{ secrets.CONAN_REMOTE_TOKEN }}
          username: ${{ secrets.CONAN_REMOTE_USERNAME }}

      - name: Configure CMake
        run: |
          cmake -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON -DCMAKE_INSTALL_PREFIX=${{ matrix.profile }} -DNIKU_REGISTER_GPU_UNIT_TESTS=OFF --preset release

      - name: Build
        run: |
          cmake --build --parallel --preset release
      
      - name: Test
        run: |
          ctest --preset release

      - name: Upload Conan packages
        uses: ./.github/actions/upload-conan

      - name: Install
        run: |
          cmake --install build/Release

  windows-msvc:
    runs-on: windows-2025
    environment: Conan

    strategy:
      fail-fast: false
      matrix:
        profile: [msvc-amd64-windows-hardened]

    steps:
      - name: Initialize
        run: |
          git config --global core.autocrlf input
          
      - name: Checkout repository from github
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Chocolatey packages
        run: |
          choco install cmake --version 4.2.3 -y

      - name: Setup Conan
        id: setup-conan
        uses: ./.github/actions/setup-conan
        with:
          profile: ${{ matrix.profile }}
          url: ${{ secrets.CONAN_REMOTE_URL }}
          token: ${{ secrets.CONAN_REMOTE_TOKEN }}
          username: ${{ secrets.CONAN_REMOTE_USERNAME }}

      - name: Configure CMake
        run: |
          cmake -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON -DCMAKE_INSTALL_PREFIX=${{ matrix.profile }} -DNIKU_REGISTER_GPU_UNIT_TESTS=OFF --preset default
          
      - name: Build
        run: |
          cmake --build --parallel --preset multi-release

      - name: Test
        run: |
          ctest --preset multi-release

      - name: Upload Conan packages
        uses: ./.github/actions/upload-conan

      - name: Install
        run: |
          cmake --install build --config Release

  windows-msvc-2026:
    runs-on: windows-2025-vs2026
    environment: Conan

    strategy:
      fail-fast: false
      matrix:
        profile: [msvc-2026-amd64-windows-hardened]

    steps:
      - name: Initialize
        run: |
          git config --global core.autocrlf input
          
      - name: Checkout repository from github
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Chocolatey packages
        run: |
          choco install cmake --version 4.2.3 -y

      - name: Setup Conan
        id: setup-conan
        uses: ./.github/actions/setup-conan
        with:
          profile: ${{ matrix.profile }}
          url: ${{ secrets.CONAN_REMOTE_URL }}
          token: ${{ secrets.CONAN_REMOTE_TOKEN }}
          username: ${{ secrets.CONAN_REMOTE_USERNAME }}

      - name: Configure CMake
        run: |
          cmake -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON -DCMAKE_INSTALL_PREFIX=${{ matrix.profile }} -DNIKU_REGISTER_GPU_UNIT_TESTS=OFF --preset default
          
      - name: Build
        run: |
          cmake --build --parallel --preset multi-release

      - name: Test
        run: |
          ctest --preset multi-release

      - name: Upload Conan packages
        uses: ./.github/actions/upload-conan

      - name: Install
        run: |
          cmake --install build --config Release

  windows-clang:
    runs-on: windows-2025
    environment: Conan
    
    env:
      CLANG_VER: 21
      
    strategy:
      fail-fast: false
      matrix:
        profile: [clang-amd64-windows-hardened]

    steps:
      - name: Initialize
        run: |
          git config --global core.autocrlf input
          
      - name: Checkout repository from github
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Chocolatey packages
        run: |
          choco install cmake --version 4.2.3 -y
          choco install ninja
          choco install llvm --version 21.1.7 -y
          
      - name: Setup Conan
        id: setup-conan
        uses: ./.github/actions/setup-conan
        with:
          profile: ${{ matrix.profile }}
          url: ${{ secrets.CONAN_REMOTE_URL }}
          token: ${{ secrets.CONAN_REMOTE_TOKEN }}
          username: ${{ secrets.CONAN_REMOTE_USERNAME }}

      - name: Configure CMake
        run: |
          cmake -G=Ninja -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON -DCMAKE_INSTALL_PREFIX=${{ matrix.profile }} -DNIKU_REGISTER_GPU_UNIT_TESTS=OFF --preset release
          
      - name: Build
        run: |
          cmake --build --parallel --preset release

      - name: Test
        run: |
          ctest --preset release

      - name: Upload Conan packages
        uses: ./.github/actions/upload-conan

      - name: Install
        run: |
          cmake --install build/Release
